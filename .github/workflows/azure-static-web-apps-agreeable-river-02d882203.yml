name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
          persist-credentials: false

      - name: Install OIDC Client from Core Package
        run: npm install --no-save @actions/core@1.6.0 @actions/http-client

      - name: Get Id Token
        uses: actions/github-script@v7
        id: idtoken
        with:
          script: |
            const coredemo = require('@actions/core')
            return await coredemo.getIDToken()
          result-encoding: string

      - name: Build And Deploy (Production)
        if: github.ref == 'refs/heads/main'
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AGREEABLE_RIVER_02D882203 }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: "dist"
          github_id_token: ${{ steps.idtoken.outputs.result }}

      # --- Staging: write .env so Vite picks up staging-specific vars during Oryx build ---

      - name: Write staging .env
        if: github.ref == 'refs/heads/staging'
        env:
          CLERK_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY_STAGING }}
          GEMINI_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
        run: |
          printf 'VITE_API_URL=https://moodboardlab-api-staging.azurewebsites.net\n' > .env
          printf 'VITE_CLERK_PUBLISHABLE_KEY=%s\n' "$CLERK_KEY" >> .env
          printf 'VITE_GEMINI_API_KEY=%s\n' "$GEMINI_KEY" >> .env

      - name: Build And Deploy (Staging)
        if: github.ref == 'refs/heads/staging'
        id: builddeploy_staging
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AGREEABLE_RIVER_02D882203 }}
          action: "upload"
          deployment_environment: "staging"
          app_location: "/"
          api_location: ""
          output_location: "dist"

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AGREEABLE_RIVER_02D882203 }}
          action: "close"
